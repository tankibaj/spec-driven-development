openapi: "3.1.0"

info:
  title: Order Service API
  version: "1.1.0"
  description: >
    Manages order creation, lifecycle transitions, payment coordination,
    admin authentication, and shipping method configuration.
    All endpoints require a valid tenant context via the `X-Tenant-ID` header.

servers:
  - url: https://example.com/order-service/api/v1/
    description: Production

tags:
  - name: Auth
    description: Admin authentication (login, MFA, token refresh)
  - name: Checkout
    description: Guest and authenticated checkout flows
  - name: Orders
    description: Order retrieval and lifecycle management

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Admin Authentication ────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      summary: Authenticate an admin user
      tags: [Auth]
      description: >
        Authenticates a merchant admin user with email and password.
        Returns a JWT. For `merchant_viewer` and `merchant_support` roles,
        the JWT grants full read access. For `merchant_owner` and
        `merchant_admin` roles, the JWT is flagged as pre-MFA and requires
        TOTP verification before accessing admin endpoints.
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mfa/verify:
    post:
      operationId: verifyMfa
      summary: Verify TOTP code for MFA
      tags: [Auth]
      description: >
        Verifies a TOTP code for `merchant_owner` and `merchant_admin`
        users. Requires a pre-MFA JWT from the login endpoint. Returns
        a fully authenticated JWT on success.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
      responses:
        "200":
          description: MFA verification successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifyResponse"
        "401":
          description: Invalid or expired TOTP code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: JWT is not a pre-MFA token or MFA not required for this role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/token/refresh:
    post:
      operationId: refreshToken
      summary: Refresh an expired JWT
      tags: [Auth]
      description: >
        Exchanges a valid (but possibly expired) JWT for a new one.
        Refresh tokens have a longer TTL than access tokens.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
      responses:
        "200":
          description: Token refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
        "401":
          description: Refresh token is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Guest Session ──────────────────────────────────────────────────────────
  /checkout/guest/sessions:
    post:
      operationId: createGuestSession
      summary: Create a guest checkout session
      tags: [Checkout]
      description: >
        Initialises a new Guest Session. Returns a session token to be included
        in subsequent checkout requests. The session expires after 24 hours of
        inactivity.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cart_id:
                  type: string
                  format: uuid
                  description: ID of an existing anonymous cart to attach to this session.
      responses:
        "201":
          description: Guest session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  # ── Shipping Methods ────────────────────────────────────────────────────────
  /checkout/shipping-methods:
    get:
      operationId: listShippingMethods
      summary: List available shipping methods
      tags: [Checkout]
      description: >
        Returns the available shipping methods for the tenant. Used by the
        storefront during checkout to populate the shipping method selector.
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Shipping methods returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShippingMethod"

  # ── Order Placement ────────────────────────────────────────────────────────
  /checkout/guest/orders:
    post:
      operationId: placeGuestOrder
      summary: Place a guest order
      tags: [Checkout]
      description: >
        Validates the cart, reserves stock, creates a Payment Intent, and
        places the order atomically. Requires a valid guest session token.
        Idempotent when the same `Idempotency-Key` header is provided.
      security:
        - guestSession: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceGuestOrderRequest"
      responses:
        "201":
          description: Order placed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Guest session token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict — one or more items are out of stock.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  # ── Order Retrieval ────────────────────────────────────────────────────────
  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get an order by ID
      tags: [Orders]
      description: >
        Returns full order details. Accessible to the owning Customer,
        any merchant admin role, and platform ops.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Missing or invalid authentication token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (e.g., pre-MFA JWT).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /orders:
    get:
      operationId: listOrders
      summary: List orders (merchant / platform roles only)
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - name: q
          in: query
          description: >
            Free-text search across order reference and guest email.
            Returns orders where `reference` or `guest_email` contains the
            search term (case-insensitive).
          schema:
            type: string
            maxLength: 200
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated list of orders.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
        "401":
          description: Missing or invalid authentication token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (e.g., pre-MFA JWT).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ─────────────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    guestSession:
      type: apiKey
      in: header
      name: X-Guest-Session-Token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: The tenant this request belongs to.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 64
      description: >
        Client-generated token for safe retries. Repeat the same key to get
        the original response without creating a duplicate order.

  schemas:

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: JWT access token.
        refresh_token:
          type: string
          description: Refresh token for obtaining new access tokens.
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Token lifetime in seconds.
        mfa_required:
          type: boolean
          description: >
            True for `merchant_owner` and `merchant_admin` roles.
            When true, the access_token is a pre-MFA token that cannot
            access admin endpoints until MFA verification is completed.

    MfaVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit TOTP code from the user's authenticator app.

    MfaVerifyResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Fully authenticated JWT (MFA verified).
        refresh_token:
          type: string
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer

    TokenRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenRefreshResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer

    # ── Checkout ────────────────────────────────────────────────────────────
    GuestSession:
      type: object
      required: [id, token, expires_at]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          description: Opaque token to include in `X-Guest-Session-Token`.
        expires_at:
          type: string
          format: date-time

    ShippingMethod:
      type: object
      required: [id, name, cost_minor]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Standard Shipping"
        description:
          type: string
          example: "Delivery in 3-5 business days"
        cost_minor:
          type: integer
          description: Shipping cost in minor currency units (e.g. cents).
          example: 599
        estimated_days_min:
          type: integer
          description: Minimum estimated delivery days.
          example: 3
        estimated_days_max:
          type: integer
          description: Maximum estimated delivery days.
          example: 5

    PlaceGuestOrderRequest:
      type: object
      required: [email, shipping_address, shipping_method_id, payment_method, lines]
      properties:
        email:
          type: string
          format: email
        shipping_address:
          $ref: "#/components/schemas/Address"
        shipping_method_id:
          type: string
          format: uuid
        payment_method:
          $ref: "#/components/schemas/PaymentMethodInput"
        lines:
          type: array
          minItems: 1
          description: >
            Items to order. There is no separate cart service — the storefront
            passes order lines explicitly. Each line references a SKU and a quantity.
          items:
            type: object
            required: [sku_id, quantity]
            properties:
              sku_id:
                type: string
                format: uuid
                description: The SKU to order.
              quantity:
                type: integer
                minimum: 1

    Address:
      type: object
      required: [line1, city, postal_code, country_code]
      properties:
        line1:
          type: string
          maxLength: 100
        line2:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        country_code:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code.

    PaymentMethodInput:
      type: object
      required: [type, token]
      properties:
        type:
          type: string
          enum: [card, digital_wallet]
        token:
          type: string
          description: Tokenised payment instrument from the payment gateway SDK.

    # ── Orders ──────────────────────────────────────────────────────────────
    Order:
      type: object
      required: [id, reference, status, lines, total, created_at]
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
          example: "ORD-20240415-A3K9"
        status:
          $ref: "#/components/schemas/OrderStatus"
        guest_email:
          type: string
          format: email
          description: Email provided during guest checkout. Null for authenticated orders.
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
        subtotal:
          type: integer
          description: Order subtotal in minor currency units (e.g. cents).
        shipping_cost:
          type: integer
        tax:
          type: integer
        total:
          type: integer
          description: Order total in minor currency units.
        shipping_address:
          $ref: "#/components/schemas/Address"
        notification_id:
          type: string
          format: uuid
          nullable: true
          description: >
            ID of the confirmation notification sent via notification-service.
            Null if notification has not been dispatched yet.
        notification_status:
          type: string
          enum: [queued, sent, delivered, failed]
          nullable: true
          description: >
            Delivery status of the order confirmation notification, synced
            from notification-service. Null if no notification exists.
        created_at:
          type: string
          format: date-time

    OrderLine:
      type: object
      required: [sku_id, quantity, unit_price, subtotal]
      properties:
        sku_id:
          type: string
          format: uuid
        product_name:
          type: string
        variant_label:
          type: string
          description: Human-readable variant description (e.g. "Blue / XL").
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: integer
          description: Unit price in minor currency units at time of order.
        subtotal:
          type: integer

    OrderStatus:
      type: string
      enum: [pending, confirmed, processing, shipped, delivered, cancelled]

    OrderPage:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            per_page:
              type: integer

    StockConflictError:
      type: object
      required: [code, message, conflicts]
      properties:
        code:
          type: string
          example: "STOCK_CONFLICT"
        message:
          type: string
        conflicts:
          type: array
          items:
            type: object
            properties:
              sku_id:
                type: string
                format: uuid
              requested:
                type: integer
              available:
                type: integer

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string

  responses:
    BadRequest:
      description: The request is malformed or missing required fields.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnprocessableEntity:
      description: The request is well-formed but contains semantic errors.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
