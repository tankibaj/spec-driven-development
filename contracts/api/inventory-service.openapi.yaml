openapi: "3.1.0"

info:
  title: Inventory Service API
  version: "1.0.0"
  description: >
    Manages the product catalogue, SKUs, stock levels, and reservations.
    All endpoints require a valid tenant context via the `X-Tenant-ID` header.

servers:
  - url: https://example.com/inventory-service/api/v1/
    description: Production

tags:
  - name: Products
    description: Product and SKU catalogue management
  - name: Stock
    description: Stock level queries and reservation management

paths:

  # ── Products ───────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      summary: List products in the catalogue
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: in_stock_only
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated product list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

    post:
      operationId: createProduct
      summary: Create a new product
      tags: [Products]
      description: Requires `merchant_owner` or `merchant_admin` role.
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"

  /products/{productId}:
    get:
      operationId: getProduct
      summary: Get a product by ID
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - $ref: "#/components/parameters/ProductID"
      responses:
        "200":
          description: Product found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Stock ──────────────────────────────────────────────────────────────────
  /stock/{skuId}:
    get:
      operationId: getStockLevel
      summary: Get current stock level for a SKU
      tags: [Stock]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: skuId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Stock level returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLevel"
        "404":
          $ref: "#/components/responses/NotFound"

  /stock/reserve:
    post:
      operationId: reserveStock
      summary: Reserve stock for a set of SKUs
      tags: [Stock]
      description: >
        Places a temporary hold on the requested quantities. Called by the
        Order Service during checkout. Reservations expire after 15 minutes
        if not converted to a deduction.
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveStockRequest"
      responses:
        "200":
          description: Reservations created for all requested SKUs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveStockResponse"
        "409":
          description: One or more SKUs have insufficient stock.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockConflictError"

  /stock/deduct:
    post:
      operationId: deductStock
      summary: Convert reservations to permanent deductions on order confirmation
      tags: [Stock]
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeductStockRequest"
      responses:
        "200":
          description: Stock deducted successfully.
        "409":
          description: Reservation not found or already expired.

  /stock/reservations/{reservationId}/release:
    post:
      operationId: releaseReservation
      summary: Release (cancel) a stock reservation
      tags: [Stock]
      description: >
        Saga compensation step. Called by the order-service when payment fails
        after stock has been reserved. Decrements the `reserved` counter and
        deletes the reservation record.
      parameters:
        - $ref: "#/components/parameters/TenantID"
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Reservation released successfully.
        "404":
          description: Reservation not found (already released or never existed — treat as success).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:

  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 64

    ProductID:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    Product:
      type: object
      required: [id, name, skus, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        image_url:
          type: string
          format: uri
          maxLength: 500
          nullable: true
          description: URL of the product thumbnail image. Null if no image uploaded.
        skus:
          type: array
          items:
            $ref: "#/components/schemas/SKU"
        created_at:
          type: string
          format: date-time

    SKU:
      type: object
      required: [id, label, price_minor, stock_level]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          description: Human-readable variant label (e.g. "Blue / XL").
        price_minor:
          type: integer
          description: Price in minor currency units (e.g. cents).
        stock_level:
          type: integer
          minimum: 0

    CreateProductRequest:
      type: object
      required: [name, skus]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        image_url:
          type: string
          format: uri
          maxLength: 500
          nullable: true
          description: URL of the product thumbnail image.
        skus:
          type: array
          minItems: 1
          items:
            type: object
            required: [label, price_minor, initial_stock]
            properties:
              label:
                type: string
              price_minor:
                type: integer
                minimum: 0
              initial_stock:
                type: integer
                minimum: 0

    ProductPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            per_page:
              type: integer

    StockLevel:
      type: object
      required: [sku_id, available, reserved]
      properties:
        sku_id:
          type: string
          format: uuid
        available:
          type: integer
          description: Units available for purchase (total minus reserved).
        reserved:
          type: integer
          description: Units currently held by active reservations.
        total:
          type: integer
          description: Total physical stock on hand.

    ReserveStockRequest:
      type: object
      required: [order_id, lines]
      properties:
        order_id:
          type: string
          format: uuid
          description: The pending order ID this reservation is for.
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku_id, quantity]
            properties:
              sku_id:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1

    ReserveStockResponse:
      type: object
      required: [reservation_id, expires_at]
      properties:
        reservation_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time

    DeductStockRequest:
      type: object
      required: [reservation_id]
      properties:
        reservation_id:
          type: string
          format: uuid

    StockConflictError:
      type: object
      required: [code, message, conflicts]
      properties:
        code:
          type: string
          example: "STOCK_CONFLICT"
        message:
          type: string
        conflicts:
          type: array
          items:
            type: object
            properties:
              sku_id:
                type: string
                format: uuid
              requested:
                type: integer
              available:
                type: integer

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: The request is malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
