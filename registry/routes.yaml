# Workspace registry — every service and app in the project.
# Keyed by id for direct lookup by the AI agent.
#
# Fields the agent uses:
#   path:      where the submodule lives locally
#   type:      backend | frontend
#   language:  primary implementation language
#   framework: (frontend only)
#   contracts: spec files this workspace owns
workspaces:
  order-service:
    path: workspaces/order-service
    type: backend
    language: python
    contracts:
      - contracts/api/order-service.openapi.yaml
      - contracts/data-schema/order.schema.md

  inventory-service:
    path: workspaces/inventory-service
    type: backend
    language: python
    contracts:
      - contracts/api/inventory-service.openapi.yaml
      - contracts/data-schema/product.schema.md

  notification-service:
    path: workspaces/notification-service
    type: backend
    language: python
    contracts:
      - contracts/api/notification-service.openapi.yaml

  storefront-app:
    path: workspaces/storefront-app
    type: frontend
    language: typescript
    framework: react

  admin-app:
    path: workspaces/admin-app
    type: frontend
    language: typescript
    framework: react
